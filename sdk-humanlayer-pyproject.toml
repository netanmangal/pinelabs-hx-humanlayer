[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "humanlayer"
version = "0.1.0"
description = "Zero-code AI agent monitoring with Human-in-the-Loop for LangChain/LangGraph"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "langchain-core>=0.1.0",
    "httpx>=0.25.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]

[tool.setuptools.packages.find]
where = ["."]
include = ["humanlayer*"]
